[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Set COUNTRY and SITE_URL in the Netlify dashboard
  # (Site settings → Environment variables) rather than committing them here.

# SPA fallback (public/_redirects also covers this, kept here for clarity).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Asset caching for hashed files emitted by Vite.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
